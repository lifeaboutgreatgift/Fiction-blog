<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pride and Prejudice - The Fiction Review</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <!-- NAVBAR -->
        <nav class="navbar">
            <div class="nav-left">
                <a href="#">Home</a>
                <a href="#">Fiction</a>
                <a href="#">Poetry</a>
                <a href="#">Reviews</a>
            </div>
            <div class="logo">THE FICTION REVIEW</div>
            <div class="nav-right">
                <a href="#">Sign In</a>
                <button class="sub-btn">Subscribe</button>
            </div>
        </nav>

        <!-- HERO IMAGE -->
        <div class="hero-image">
            <img src="" alt="" id="article-img">
        </div>

        <!-- ARTICLE HEADER -->
        <div class="article-header">
            <p class="article-category" id="article-category"></p>
            <h1 class="article-title" id="article-title"></h1>
            <p class="article-author" id="article-author"></p>
            <p class="article-date" id="article-date"></p>
            <div class="divider" ></div>
        </div>

        <!-- ARTICLE CONTENT -->
        <article class="article-content" id="article-content-wrapper">
        </article>

        <!-- FOOTER -->
        <footer class="footer">
            <p>© 2026 The Fiction Review. All rights reserved.</p>
        </footer>

    </body>
</html>
